<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOLA – Tisseuse de liens</title>

  <meta property="og:title" content="LOLA – Tisseuse de liens" />
  <meta property="og:description" content="Une chanson pour Lola" />
  <meta property="og:image" content="tete-lola.png" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* =========================
       FOND STYLE "MIREILLE"
       ========================= */

    .bg {
      position: fixed;
      inset: 0;
      background-image: url("tete-lola.png");
      background-size: cover;
      background-position: center;
      filter: blur(35px) brightness(0.35) saturate(1.2);
      transform: scale(1.2);
    }

    /* halo lumineux central */
    .halo {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center,
          rgba(255, 200, 120, 0.25) 0%,
          rgba(255, 200, 120, 0.15) 25%,
          rgba(0,0,0,0.4) 60%,
          rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }

    /* vignette sombre pour profondeur */
    .vignette {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center,
          transparent 40%,
          rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin: 0;
      letter-spacing: 3px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .subtitle {
      margin-bottom: 30px;
      opacity: 0.85;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    /* =========================
       DISQUE
       ========================= */

    .disc {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      margin: auto;
     background:
  radial-gradient(circle at center,
    rgba(255,255,255,0.25) 0 8%,
    rgba(0,0,0,0.2) 9%,
    transparent 12%),

  radial-gradient(circle at center,
    transparent 0 35%,
    rgba(255,255,255,0.05) 36%,
    rgba(0,0,0,0.3) 100%),

  repeating-radial-gradient(circle,
    rgba(255,255,255,0.05) 0 2px,
    rgba(0,0,0,0.15) 2px 5px),

  url("tete-lola.png") center/cover no-repeat;
      box-shadow:
        0 20px 50px rgba(0,0,0,0.7),
        inset 0 0 0 2px rgba(255,255,255,0.1);
      animation: spin 12s linear infinite;
      animation-play-state: paused;
    }

    .playing {
      animation-play-state: running;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* =========================
       CONTROLES
       ========================= */

    button {
      margin: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      color: white;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    input[type="range"] {
      width: 320px;
    }

    .time {
      font-size: 13px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<div class="bg"></div>
<div class="halo"></div>
<div class="vignette"></div>

<div class="container">
  <h1>LOLA</h1>
  <div class="subtitle">Tisseuse de liens</div>

  <div id="disc" class="disc"></div>

  <div>
    <button onclick="playAudio()">Lecture</button>
    <button onclick="pauseAudio()">Pause</button>
    <button onclick="restartAudio()">Reprendre au début</button>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <input id="progress" type="range" value="0">
    <span id="duration">0:00</span>
  </div>

</div>

<audio id="audio">
  <source src="chanson-lola.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById("audio");
  const disc = document.getElementById("disc");
  const progress = document.getElementById("progress");
  const current = document.getElementById("current");
  const duration = document.getElementById("duration");

  function playAudio(){
    audio.play();
    disc.classList.add("playing");
  }

  function pauseAudio(){
    audio.pause();
    disc.classList.remove("playing");
  }

  function restartAudio(){
    audio.currentTime = 0;
    playAudio();
  }

  function format(t){
    let m = Math.floor(t/60);
    let s = Math.floor(t%60);
    return m + ":" + (s<10?"0":"") + s;
  }

  audio.addEventListener("timeupdate", ()=>{
    progress.value = (audio.currentTime / audio.duration) * 100;
    current.textContent = format(audio.currentTime);
  });

  audio.addEventListener("loadedmetadata", ()=>{
    duration.textContent = format(audio.duration);
  });

  progress.addEventListener("input", ()=>{
    audio.currentTime = (progress.value / 100) * audio.duration;
  });
</script>

</body>
</html>
